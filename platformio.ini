; dump1090 radar display — PlatformIO project
;
;   esp32-s3-radar   : ESP32-S3 + ST7701 RGB 480x480 (PSRAM, touch)
;   esp32-c6-ili9341 : ESP32-C6 + ILI9341 SPI 240x240 crop (no PSRAM, no touch)
;
; PSRAM is enabled via the board JSON (memory_type: qio_opi).
; No custom_sdkconfig needed — defaults are correctly 40MHz Octal.

[platformio]
boards_dir = boards

[env]
platform    = espressif32@~6.9.0
framework   = arduino
monitor_speed = 115200

build_flags =
    -Isrc
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE

[env:esp32-s3-radar]
board = esp32-s3-devkitc-1-n16r8

lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    lovyan03/LovyanGFX@^1.1.0
    https://github.com/TAMCTec/gt911-arduino.git

build_flags =
    ${env.build_flags}
    -DSTANDARD_ST7701
    -DBOARD_HAS_PSRAM

[env:esp32-c6-ili9341]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board    = esp32-c6-devkitc-1

lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    lovyan03/LovyanGFX@^1.1.0

build_flags =
    ${env.build_flags}
    -DPLATFORM_C6_ILI9341
