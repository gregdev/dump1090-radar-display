; PlatformIO project for ESP32 radar display
;
; Two build targets — select with default_envs or pio run -e <env>
;
;   esp32-s3-4848s040 : S3 + ST7701 RGB 480x480 (PSRAM, touch)
;   esp32-c6-ili9341  : C6 + ILI9341 SPI  240x240 crop (no PSRAM, no touch)

[env:esp32-s3-4848s040]
platform    = espressif32@~6.9.0
board       = esp32-s3-devkitc-1-n8r8
framework   = arduino

monitor_speed = 115200

lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    lovyan03/LovyanGFX@^1.1.0
    https://github.com/TAMCTec/gt911-arduino.git

boards_dir = boards

build_flags =
    -I.
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DSTANDARD_ST7701
    -DBOARD_HAS_PSRAM

[env:esp32-c6-ili9341]
platform    = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board       = esp32-c6-devkitc-1
framework   = arduino

monitor_speed = 115200

boards_dir = boards

lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    lovyan03/LovyanGFX@^1.1.0

build_flags =
    -I.
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DPLATFORM_C6_ILI9341

