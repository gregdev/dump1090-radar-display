; Fully isolated, minimal pure ESP-IDF project (no Arduino framework at all).
; Purpose: triple-confirm the PSRAM init failure independent of Arduino-esp32
; core, HybridCompile, custom_sdkconfig, and custom board JSONs.

[env:esp32s3]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = espidf
board     = esp32-s3-devkitc-1

monitor_speed = 115200
