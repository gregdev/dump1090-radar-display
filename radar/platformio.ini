; PlatformIO project for ESP32 radar display
;
; Two build targets — select with default_envs or pio run -e <env>
;
;   esp32-s3-4848s040 : S3 + ST7701 RGB 480x480 (PSRAM, touch)
;   esp32-c6-ili9341  : C6 + ILI9341 SPI  240x240 crop (no PSRAM, no touch)
;
; Build:   pio run -e esp32-c6-ili9341
; Flash:   pio run -e esp32-c6-ili9341 --target upload
; Monitor: pio run -e esp32-c6-ili9341 --target monitor

[env:esp32-s3-4848s040]
platform    = espressif32@~6.9.0
board       = esp32-s3-4848s040
framework   = arduino

monitor_speed = 115200

; custom board with PSRAM support — see boards/esp32-s3-4848s040.json
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi

; ── Libraries ─────────────────────────────────────────────
lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    lovyan03/LovyanGFX@^1.1.0
    https://github.com/TAMCTec/gt911-arduino.git

; custom board directory
boards_dir = boards

; ── Build flags ───────────────────────────────────────────
; Pull in shared sources from ../src and lv_conf.h from project root
build_flags =
    -I.
    -I../src
    -I../radar/src
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE

; ── Extra source directories (shared with PC sim) ─────────
extra_scripts = pre:extra_src.py

; ════════════════════════════════════════════════════════════
;  ESP32-C6 + ILI9341 2.4" SPI TFT  (240×320 → 240×240 crop)
; ════════════════════════════════════════════════════════════
[env:esp32-c6-ili9341]
platform    = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board       = esp32-c6-devkitc-1
framework   = arduino

monitor_speed = 115200

; custom board with Arduino support — see boards/esp32-c6-devkitc-1.json
boards_dir = boards

; ── Libraries (no gt911 touch on this target) ─────────────
lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    lovyan03/LovyanGFX@^1.1.0

; ── Build flags ───────────────────────────────────────────
build_flags =
    -I.
    -I../src
    -I../radar/src
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DPLATFORM_C6_ILI9341

; ── Extra source directories (shared with PC sim) ─────────
extra_scripts = pre:extra_src.py
