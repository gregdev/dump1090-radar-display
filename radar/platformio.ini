; PlatformIO project for ESP32-S3 radar display
; Board: ESP32-4848S040 (ST7701 RGB panel, 8MB PSRAM, 16MB Flash)
;
; Build:   pio run
; Flash:   pio run --target upload
; Monitor: pio run --target monitor

[env:esp32-s3-4848s040]
platform    = espressif32@~6.9.0
board       = esp32-s3-4848s040
framework   = arduino

monitor_speed = 115200

; custom board with PSRAM support — see boards/esp32-s3-4848s040.json
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi

; ── Libraries ─────────────────────────────────────────────
lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    lovyan03/LovyanGFX@^1.1.0
    https://github.com/TAMCTec/gt911-arduino.git

; custom board directory
boards_dir = boards

; ── Build flags ───────────────────────────────────────────
; Pull in shared sources from ../src and lv_conf.h from project root
build_flags =
    -I../src
    -I../radar/src
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE

; ── Extra source directories (shared with PC sim) ─────────
extra_scripts = pre:extra_src.py
