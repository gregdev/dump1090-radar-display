<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radar Land Mask — Adelaide 40 NM</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; flex-direction:column; align-items:center;
         font-family:monospace; color:#ccc; }
  h2 { margin:12px 0 8px; font-size:14px; }
  p  { margin:0 0 12px; font-size:11px; color:#888; }
  #map { width:480px; height:480px; }
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<h2>Radar Land Mask — Adelaide · 40 NM range</h2>
<p>Home: −34.9055°, 138.6356° &nbsp;|&nbsp; Screenshot → <code>python3 tools/png_to_land.py map.png &gt; src/land_mask.h</code></p>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const HOME_LAT = -34.905463157242856;
  const HOME_LON =  138.635601706212;
  const dLat = 40 / 60.04;
  const dLon = 40 / (60.04 * Math.cos(HOME_LAT * Math.PI / 180));
  const bounds = [[HOME_LAT - dLat, HOME_LON - dLon], [HOME_LAT + dLat, HOME_LON + dLon]];
  const map = L.map('map', { zoomControl:false, attributionControl:false }).fitBounds(bounds);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', { maxZoom:19 }).addTo(map);
</script>
</body>
</html>
